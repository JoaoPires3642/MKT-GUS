services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: mktgus-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mktgus}
      MYSQL_USER: ${MYSQL_USER:-mktgus}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mktgus123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    networks:
      - mktgus-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Spring Boot Backend (Autoatendimento)
  autoatendimento:
    build:
      context: ./autoatendimento
      dockerfile: Dockerfile
    container_name: mktgus-autoatendimento
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-mktgus}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-mktgus}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-mktgus123}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_DDL_AUTO:-update}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./logs/autoatendimento:/app/logs
      # Hot reload for development (uncomment if needed)
      # - ./autoatendimento/src:/app/src
    networks:
      - mktgus-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Frontend (Self-Checkout)
  self-checkout:
    build:
      context: ./self-checkout
      dockerfile: Dockerfile
    container_name: mktgus-self-checkout
    restart: unless-stopped
    depends_on:
      autoatendimento:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: http://autoatendimento:8080
      NEXT_PUBLIC_WS_URL: ws://autoatendimento:8080/ws
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./logs/self-checkout:/app/logs
      # Hot reload for development (uncomment if needed)
      # - ./self-checkout/src:/app/src
      # - ./self-checkout/public:/app/public
    networks:
      - mktgus-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: mktgus-nginx
    restart: unless-stopped
    depends_on:
      - autoatendimento
      - self-checkout
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - mktgus-network
    profiles:
      - with-nginx

networks:
  mktgus-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local

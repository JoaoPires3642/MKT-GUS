services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mktgus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mktgus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Spring Boot Backend (Autoatendimento)
  autoatendimento:
    build:
      context: ./autoatendimento
      dockerfile: Dockerfile
    container_name: mktgus-autoatendimento
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-postgres}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_DDL_AUTO:-update}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SERVER_PORT: 8080
      TZ: America/Sao_Paulo
      JAVA_TOOL_OPTIONS: -Duser.timezone=America/Sao_Paulo
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ./logs/autoatendimento:/app/logs
      # Hot reload for development (uncomment if needed)
      # - ./autoatendimento/src:/app/src
    networks:
      - mktgus-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Frontend (Self-Checkout)
  self-checkout:
    build:
      context: ./self-checkout
      dockerfile: Dockerfile
    container_name: mktgus-self-checkout
    restart: unless-stopped
    depends_on:
      autoatendimento:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: http://autoatendimento:8080
      NEXT_PUBLIC_WS_URL: ws://autoatendimento:8080/ws
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./logs/self-checkout:/app/logs
      # Hot reload for development (uncomment if needed)
      # - ./self-checkout/src:/app/src
      # - ./self-checkout/public:/app/public
    networks:
      - mktgus-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: mktgus-nginx
    restart: unless-stopped
    depends_on:
      - autoatendimento
      - self-checkout
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - mktgus-network
    profiles:
      - with-nginx

networks:
  mktgus-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

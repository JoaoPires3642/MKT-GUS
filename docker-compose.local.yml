version: '3.8'

services:
  # PostgreSQL Database (local dev)
  postgres:
    image: postgres:16-alpine
    container_name: mktgus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mktgus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend (local dev)
  autoatendimento:
    build:
      context: ./autoatendimento
      dockerfile: Dockerfile
    container_name: mktgus-autoatendimento
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_HIKARI_SCHEMA: public
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    networks:
      - mktgus-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Frontend (local dev)
self-checkout:
    build:
      context: ./self-checkout
      dockerfile: Dockerfile
    container_name: mktgus-self-checkout
    restart: unless-stopped
    depends_on:
      autoatendimento:
        condition: service_healthy
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://mktgus-autoatendimento:8080
      NEXT_PUBLIC_WS_URL: ws://mktgus-autoatendimento:8080/ws
    ports:
      - "3000:3000"
    networks:
      - mktgus-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 30s

networks:
  mktgus-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
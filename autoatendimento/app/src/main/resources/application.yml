spring:
  application:
    name: autoatendimento
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:false}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

pontos:
  valor-por-ponto: ${PONTOS_VALOR_POR_PONTO:5.0}
  pontos-por-bloco: ${PONTOS_PONTOS_POR_BLOCO:10}

mercado:
  id: ${MERCADO_ID:1}

payment:
  provider: ${PAYMENT_PROVIDER:fake}
  fake-approval-delay-ms: ${PAYMENT_FAKE_APPROVAL_DELAY_MS:2000}
  expiration-minutes: ${PAYMENT_EXPIRATION_MINUTES:15}

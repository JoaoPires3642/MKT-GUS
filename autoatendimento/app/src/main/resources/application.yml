spring:
  application:
    name: autoatendimento
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:false}
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:25}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    mail:
      enabled: false

pontos:
  valor-por-ponto: ${PONTOS_VALOR_POR_PONTO:5.0}
  pontos-por-bloco: ${PONTOS_PONTOS_POR_BLOCO:10}

mercado:
  id: ${MERCADO_ID:1}

payment:
  provider: ${PAYMENT_PROVIDER:fake}
  fake-approval-delay-ms: ${PAYMENT_FAKE_APPROVAL_DELAY_MS:2000}
  expiration-minutes: ${PAYMENT_EXPIRATION_MINUTES:15}

reports:
  weekly-order:
    enabled: ${REPORTS_WEEKLY_ORDER_ENABLED:true}
    recipient-email: ${REPORTS_WEEKLY_ORDER_RECIPIENT_EMAIL:fiorinarthur18@gmail.com}
    market-id: ${REPORTS_WEEKLY_ORDER_MARKET_ID:${MERCADO_ID:1}}
    cron: ${REPORTS_WEEKLY_ORDER_CRON:0 0 8 * * MON}
    zone: ${REPORTS_WEEKLY_ORDER_ZONE:America/Sao_Paulo}

name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
      - "fix/**"
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: self-checkout/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: self-checkout

      - name: Lint frontend
        run: pnpm lint
        working-directory: self-checkout

      - name: Run frontend tests
        run: pnpm test
        working-directory: self-checkout

      - name: Run frontend coverage
        run: pnpm test:coverage
        working-directory: self-checkout

      - name: Build frontend
        run: pnpm build
        working-directory: self-checkout

  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Test backend
        run: mvn -B verify
        working-directory: autoatendimento

      - name: Build backend
        run: mvn -B clean install -DskipTests
        working-directory: autoatendimento

  sonarcloud:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [frontend, backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: self-checkout/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: self-checkout

      - name: Generate frontend coverage for SonarCloud
        run: pnpm test:coverage
        working-directory: self-checkout

      - name: Generate backend coverage for SonarCloud
        run: mvn -B verify
        working-directory: autoatendimento

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=JoaoPires3642_MKT-GUS
            -Dsonar.organization=joaopires3642
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

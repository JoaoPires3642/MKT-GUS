name: Project Automation

on:
  issues:
    types: [opened, labeled, unlabeled, closed]
  pull_request:
    types: [opened, closed, merged]

jobs:
  automate-project:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Add P0/P1 issues to project
        if: >
          (github.event.action == 'opened' || github.event.action == 'labeled') &&
          (contains(github.event.issue.labels.*.name, 'P0') || contains(github.event.issue.labels.*.name, 'P1'))
        run: |
          gh api graphql -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -f query='mutation($projectId:ID!,$contentId:ID!) { addProjectV2ItemById(input:{projectId:$projectId,contentId:$contentId}){item{id}}}' \
            -f projectId='PVT_kwHOCf0pXs4BUhLR' \
            -f contentId='${{ github.event.issue.node_id }}'

      - name: Add label in-progress to issue
        if: github.event.label.name == 'in-progress'
        run: |
          gh api graphql -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -f query='mutation($projectId:ID!,$contentId:ID!) { addProjectV2ItemById(input:{projectId:$projectId,contentId:$contentId}){item{id}}}' \
            -f projectId='PVT_kwHOCf0pXs4BUhLR' \
            -f contentId='${{ github.event.issue.node_id }}'

      - name: Move to In Progress when label added
        if: github.event.label.name == 'in-progress'
        run: |
          ITEM_ID=$(gh api graphql -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -f query='query($projectId:ID!,$contentId:ID!) { projectV2ItemIds(projectId:$projectId,contentId:$contentId) { nodes { id } } }' \
            -f projectId='PVT_kwHOCf0pXs4BUhLR' \
            -f contentId='${{ github.event.issue.node_id }}' | jq -r '.data.projectV2ItemIds.nodes[0].id')
          
          if [ -n "$ITEM_ID" ]; then
            gh api graphql -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -f query='mutation($projectId:ID!,$itemId:ID!,$fieldId:ID!,$optionId:String!) { updateProjectV2ItemFieldValue(input:{projectId:$projectId,itemId:$itemId,fieldId:$fieldId,value:{singleSelectOptionId:$optionId}}){projectV2Item{id}}}' \
              -f projectId='PVT_kwHOCf0pXs4BUhLR' \
              -f itemId="$ITEM_ID" \
              -f fieldId='PVTSSF_lAHOCf0pXs4BUhLRzhBovlY' \
              -f optionId='47fc9ee4'
          fi

      - name: Move to Done when issue closed
        if: github.event.issue.state == 'closed'
        run: |
          ITEM_ID=$(gh api graphql -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -f query='query($projectId:ID!,$contentId:ID!) { projectV2ItemIds(projectId:$projectId,contentId:$contentId) { nodes { id } } }' \
            -f projectId='PVT_kwHOCf0pXs4BUhLR' \
            -f contentId='${{ github.event.issue.node_id }}' | jq -r '.data.projectV2ItemIds.nodes[0].id')
          
          if [ -n "$ITEM_ID" ]; then
            gh api graphql -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -f query='mutation($projectId:ID!,$itemId:ID!,$fieldId:ID!,$optionId:String!) { updateProjectV2ItemFieldValue(input:{projectId:$projectId,itemId:$itemId,fieldId:$fieldId,value:{singleSelectOptionId:$optionId}}){projectV2Item{id}}}' \
              -f projectId='PVT_kwHOCf0pXs4BUhLR' \
              -f itemId="$ITEM_ID" \
              -f fieldId='PVTSSF_lAHOCf0pXs4BUhLRzhBovlY' \
              -f optionId='98236657'
          fi

      - name: Move to Done when PR merged
        if: github.event.pull_request.merged == true
        run: |
          ITEM_ID=$(gh api graphql -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -f query='query($projectId:ID!,$contentId:ID!) { projectV2ItemIds(projectId:$projectId,contentId:$contentId) { nodes { id } } }' \
            -f projectId='PVT_kwHOCf0pXs4BUhLR' \
            -f contentId='${{ github.event.pull_request.node_id }}' | jq -r '.data.projectV2ItemIds.nodes[0].id')
          
          if [ -n "$ITEM_ID" ]; then
            gh api graphql -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -f query='mutation($projectId:ID!,$itemId:ID!,$fieldId:ID!,$optionId:String!) { updateProjectV2ItemFieldValue(input:{projectId:$projectId,itemId:$itemId,fieldId:$fieldId,value:{singleSelectOptionId:$optionId}}){projectV2Item{id}}}' \
              -f projectId='PVT_kwHOCf0pXs4BUhLR' \
              -f itemId="$ITEM_ID" \
              -f fieldId='PVTSSF_lAHOCf0pXs4BUhLRzhBovlY' \
              -f optionId='98236657'
          fi